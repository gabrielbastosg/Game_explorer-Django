{% extends 'games/base.html' %}

{% block title %}Entrar{% endblock %}

{% block content %}
    <div class="auth-card">
        <h1>Entrar</h1>

        <form method="post" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Entrar</button>
        </form>

        <p class="auth-switch">Não tem conta? <a href="{% url 'register' %}">Cadastre-se</a></p>
    </div>
{% endblock %}
